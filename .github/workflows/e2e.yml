name: E2E Correctness

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          path: n42-26

      - uses: actions/checkout@v4
        with:
          repository: n42blockchain/reth
          ref: chore/merge-upstream-paradigmxyz-latest
          path: reth

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            n42-26 -> target

      - name: Check (all targets)
        working-directory: n42-26
        run: cargo check --all-targets

      - name: Clippy
        working-directory: n42-26
        run: cargo clippy --all-targets -- -D warnings
        env:
          RUSTFLAGS: ""

      - name: Unit tests
        working-directory: n42-26
        run: cargo test --workspace
        env:
          RUST_LOG: error

  e2e:
    name: E2E Correctness - ${{ matrix.shard.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: smoke-consensus
            filter: "1,3,4"
          - name: mobile-rpc
            filter: "5,8,12"

    steps:
      - uses: actions/checkout@v4
        with:
          path: n42-26

      - uses: actions/checkout@v4
        with:
          repository: n42blockchain/reth
          ref: chore/merge-upstream-paradigmxyz-latest
          path: reth

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            n42-26 -> target

      - name: Build n42-node and e2e harness
        working-directory: n42-26
        run: cargo build --release -p n42-node-bin -p e2e-test
        env:
          # Correctness artifacts are cached across heterogeneous hosted runners;
          # `target-cpu=native` can restore instructions unsupported by the next
          # runner and make the test binary exit with SIGILL before a scenario runs.
          RUSTFLAGS: ""

      - name: Run E2E shard
        working-directory: n42-26
        run: >
          target/release/e2e-test
          --binary target/release/n42-node
        env:
          RUST_LOG: info
          # PR CI only runs correctness-oriented real-bin scenarios.
          # LAN pressure / timing-diagram scenarios stay in dedicated manual flows.
          E2E_SCENARIO_FILTER: ${{ matrix.shard.filter }}
          E2E_SCENARIO4_PROFILE: correctness
