name: Nightly E2E Correctness

on:
  schedule:
    # Every day at 02:00 UTC.
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scenario_filter:
        description: "Comma-separated correctness scenario numbers to run (default: 5,8,12)"
        required: false
        default: "5,8,12"

jobs:
  nightly-e2e:
    name: Nightly E2E Scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          path: n42-26

      - uses: actions/checkout@v4
        with:
          repository: n42blockchain/reth
          ref: chore/merge-upstream-fc2cc1e
          path: reth

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            n42-26 -> target

      - name: Security audit
        working-directory: n42-26
        # Ignore list — see audit.toml in the repo root for rationale per
        # advisory. All entries are transitive deps N42 doesn't control
        # directly (libp2p 0.54 / reth 2.2.0 / rustls / tracing-subscriber).
        # Drop a flag once the corresponding upstream releases the fix.
        run: |
          cargo install cargo-audit --locked --quiet
          cargo audit \
            --ignore RUSTSEC-2026-0119 \
            --ignore RUSTSEC-2026-0118 \
            --ignore RUSTSEC-2025-0009 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2025-0055

      - name: Build n42-node and e2e harness
        working-directory: n42-26
        run: cargo build --release -p n42-node-bin -p e2e-test
        env:
          RUSTFLAGS: "-C target-cpu=native"

      - name: Run nightly correctness scenarios
        working-directory: n42-26
        run: >
          target/release/e2e-test
          --binary target/release/n42-node
        env:
          RUST_LOG: info
          # Keep nightly focused on real-bin correctness coverage.
          # LAN pressure / timing-diagram scenarios run outside this workflow.
          E2E_SCENARIO_FILTER: ${{ github.event.inputs.scenario_filter || '5,8,12' }}
          E2E_SCENARIO4_PROFILE: correctness
          # Some scenarios support shortened CI durations via env knobs.
          LONG_RUN_DURATION_SECS: "600"
