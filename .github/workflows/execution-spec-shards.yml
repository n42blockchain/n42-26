name: Execution-Spec Shards

on:
  workflow_dispatch:
    inputs:
      shards:
        description: "Comma-separated shard names"
        required: false
        default: "paris+shanghai,cancun,prague,osaka,rlp"
      hive_parallelism:
        description: "Value for hive --sim.parallelism"
        required: false
        default: "4"

jobs:
  build-client-image:
    name: Build N42 Hive Client Image
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout n42-26
        uses: actions/checkout@v7
        with:
          path: workspace/n42-26

      - name: Checkout reth
        uses: actions/checkout@v7
        with:
          repository: n42blockchain/reth
          ref: chore/reth-upstream-20260719
          path: workspace/reth

      - name: Build client image
        run: |
          docker build -t reth -f workspace/n42-26/docker/n42-node/Dockerfile workspace
          docker save reth -o /tmp/reth_image.tar

      - name: Upload client image
        uses: actions/upload-artifact@v7
        with:
          name: reth_image
          path: /tmp/reth_image.tar

  prepare-hive-assets:
    name: Prepare Hive Assets
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout n42-26
        uses: actions/checkout@v7
        with:
          path: workspace/n42-26

      - name: Checkout ethereum/hive
        uses: actions/checkout@v7
        with:
          repository: ethereum/hive
          ref: master
          path: workspace/hivetests

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "^1.21"

      - name: Build execution-spec assets
        run: workspace/n42-26/.github/scripts/hive/build_execution_spec_assets.sh
        env:
          HIVE_TESTS_DIR: ${{ github.workspace }}/workspace/hivetests
          OUT_DIR: /tmp/hive_assets

      - name: Upload hive assets
        uses: actions/upload-artifact@v7
        with:
          name: hive_assets
          path: /tmp/hive_assets

  execution-spec:
    name: ${{ matrix.shard.name }} (${{ matrix.shard.tests }}, ~${{ matrix.shard.minutes }}m)
    needs:
      - build-client-image
      - prepare-hive-assets
    runs-on: ubuntu-latest
    timeout-minutes: 110
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: paris+shanghai
            tests: "~2600"
            minutes: "12"
          - name: cancun
            tests: "~17250"
            minutes: "59"
          - name: prague
            tests: "~20500"
            minutes: "71"
          - name: osaka
            tests: "~21000"
            minutes: "74"
          - name: rlp
            tests: "unchanged"
            minutes: "19"
    env:
      SHARD_SELECTED: ${{ contains(format(',{0},', github.event.inputs.shards || 'paris+shanghai,cancun,prague,osaka,rlp'), format(',{0},', matrix.shard.name)) }}

    steps:
      - uses: actions/checkout@v7
        if: env.SHARD_SELECTED == 'true'

      - name: Download hive assets
        if: env.SHARD_SELECTED == 'true'
        uses: actions/download-artifact@v8
        with:
          name: hive_assets
          path: /tmp/hive_assets

      - name: Download client image
        if: env.SHARD_SELECTED == 'true'
        uses: actions/download-artifact@v8
        with:
          name: reth_image
          path: /tmp/reth_image

      - name: Load Docker images
        if: env.SHARD_SELECTED == 'true'
        run: .github/scripts/hive/load_execution_spec_images.sh
        env:
          ASSET_DIR: /tmp/hive_assets
          RETH_IMAGE_TAR: /tmp/reth_image/reth_image.tar

      - name: Install hive binary
        if: env.SHARD_SELECTED == 'true'
        run: |
          install -m 0755 /tmp/hive_assets/hive /usr/local/bin/hive
          hive --help >/dev/null

      - name: Checkout ethereum/hive
        if: env.SHARD_SELECTED == 'true'
        uses: actions/checkout@v7
        with:
          repository: ethereum/hive
          ref: master
          path: hivetests

      - name: Run shard
        if: env.SHARD_SELECTED == 'true'
        run: scripts/run-execution-spec-shards.sh
        env:
          HIVE_TESTS_DIR: ${{ github.workspace }}/hivetests
          HIVE_PARALLELISM: ${{ github.event.inputs.hive_parallelism || '4' }}
          SHARDS: ${{ matrix.shard.name }}
          LOG_DIR: ${{ github.workspace }}/.artifacts/execution-spec/${{ matrix.shard.name }}

      - name: Upload shard logs
        if: always() && env.SHARD_SELECTED == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: execution-spec-${{ matrix.shard.name }}-logs
          path: ${{ github.workspace }}/.artifacts/execution-spec/${{ matrix.shard.name }}
